name = "skids-api"
main = "src/index.ts"
compatibility_date = "2025-03-08"
compatibility_flags = ["nodejs_compat"]
account_id = "9f4998a66a5d7bd7a230d0222544fbe6"

[vars]
ENVIRONMENT = "production"
# Phase 2 — Cloudflare AI Gateway routing
AI_GATEWAY_ACCOUNT_ID = "9f4998a66a5d7bd7a230d0222544fbe6"
AI_GATEWAY_ID = "skids-screen"

# Turso + Better Auth secrets are set via:
#   wrangler secret put TURSO_URL
#   wrangler secret put TURSO_AUTH_TOKEN
#   wrangler secret put BETTER_AUTH_SECRET
#   wrangler secret put BETTER_AUTH_API_KEY

# R2 bucket for media uploads
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "skids-media"

# R2 presigned URL credentials (set via wrangler secret put):
#   wrangler secret put CLOUDFLARE_R2_ACCESS_KEY_ID
#   wrangler secret put CLOUDFLARE_R2_SECRET_ACCESS_KEY
#   wrangler secret put CLOUDFLARE_R2_ENDPOINT
#   wrangler secret put CLOUDFLARE_R2_BUCKET
#
# AyuSynk webhook secret (optional):
#   wrangler secret put AYUSYNC_WEBHOOK_SECRET

# Cloudflare Workers AI (free, no API key needed)
[ai]
binding = "AI"

# Phase 02a
[[r2_buckets]]
binding = "R2_MODELS_BUCKET"
bucket_name = "skids-models"

# Phase 03 — JS-only PDF report renderer (satori + @resvg/resvg-wasm + pdf-lib).
# No [[sandbox]] / [[containers]] / WeasyPrint: rendering happens inside the Worker
# request so PHI never leaves the Cloudflare APAC perimeter. See
# specs/decisions/2026-04-15-phase-03-sandbox-pdfs-plan.md (addendum).
[[r2_buckets]]
binding = "R2_REPORTS_BUCKET"
bucket_name = "skids-reports"

# REPORT_SIGNING_KEY — HMAC key for report token integrity (issue + verify).
# Set via:
#   wrangler secret put REPORT_SIGNING_KEY
