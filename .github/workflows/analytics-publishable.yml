name: Analytics — nightly publishable Parquet

# Why this lives in GitHub Actions, not a Worker:
#   DuckDB does not run in a Cloudflare Worker (no WASM binding wired; bundle
#   size blows the 10 MB limit). The analytics-worker emits the canonical
#   DuckDB SQL via GET /publishable-sql; this job fetches that script, injects
#   R2 S3 credentials at runtime, and runs it with the DuckDB CLI against R2
#   to materialise the de-identified `publishable/<view>/dt=<date>/` Parquet
#   prefix that Q1–Q5 (when used via scripts/duckdb-repl.sh) read from.
#
# The raw `v1/<table>/<date>/` Parquet is produced by the analytics-worker
# scheduled handler at 20:30 UTC nightly. This job runs 21:00 UTC — 30 min
# later — so the raw data it reads is always the day-just-ended.

on:
  schedule:
    - cron: "0 21 * * *"  # 21:00 UTC daily
  workflow_dispatch:
    inputs:
      iso_date:
        description: "Override ISO date (YYYY-MM-DD). Default: yesterday UTC."
        required: false
        default: ""

# Serialise runs — one export at a time to avoid racing writes on the same
# `publishable/<view>/dt=<date>/` partition.
concurrency:
  group: analytics-publishable
  cancel-in-progress: false

jobs:
  build:
    name: Materialise publishable Parquet
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    # Required secrets — add via repo Settings → Secrets and variables → Actions:
    #   R2_ACCOUNT_ID          — the Cloudflare account id (same as in wrangler.toml)
    #   R2_ACCESS_KEY_ID       — R2 S3-compatible access key id
    #   R2_SECRET_ACCESS_KEY   — R2 S3-compatible secret
    #
    # Optional:
    #   ANALYTICS_WORKER_URL   — override for the publishable-sql endpoint
    #                            (default: https://skids-analytics.satish-9f4.workers.dev)
    env:
      ANALYTICS_WORKER_URL: ${{ vars.ANALYTICS_WORKER_URL || 'https://skids-analytics.satish-9f4.workers.dev' }}
      R2_BUCKET: skids-analytics

    steps:
      - name: Check required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.R2_ACCOUNT_ID }}" ]] && missing+=("R2_ACCOUNT_ID")
          [[ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ]] && missing+=("R2_ACCESS_KEY_ID")
          [[ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]] && missing+=("R2_SECRET_ACCESS_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing GitHub Actions secrets: ${missing[*]}"
            echo "Add them via Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: Resolve ISO date
        id: date
        run: |
          if [[ -n "${{ inputs.iso_date }}" ]]; then
            echo "iso=${{ inputs.iso_date }}" >> "$GITHUB_OUTPUT"
          else
            # Yesterday UTC — the raw cron just closed this partition at 20:30.
            echo "iso=$(date -u -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install DuckDB CLI
        run: |
          DUCKDB_VERSION=1.1.3
          curl -sSL -o /tmp/duckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip -q /tmp/duckdb.zip -d /usr/local/bin
          chmod +x /usr/local/bin/duckdb
          duckdb --version

      - name: Fetch publishable SQL for ${{ steps.date.outputs.iso }}
        id: sql
        env:
          ENDPOINT: "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          # Fetch the SQL template (secrets come in empty — we patch them in next).
          curl -sSfL "${ANALYTICS_WORKER_URL}/publishable-sql?isoDate=${{ steps.date.outputs.iso }}&bucket=${R2_BUCKET}&endpoint=${ENDPOINT}" \
            -o /tmp/publishable.sql

          # Sanity-check: should be a DuckDB script, not a JSON error.
          if ! grep -q "INSTALL httpfs" /tmp/publishable.sql; then
            echo "::error::Unexpected response from ${ANALYTICS_WORKER_URL}/publishable-sql:"
            head -20 /tmp/publishable.sql
            exit 1
          fi

          bytes=$(wc -c < /tmp/publishable.sql)
          echo "fetched $bytes bytes of SQL"
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"

      - name: Inject R2 credentials into SQL
        env:
          KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          SECRET: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # Replace empty SET statements with real credentials. The worker
          # emits them as `s3_access_key_id=''` and `s3_secret_access_key=''`.
          # We use | as sed delimiter because the secret may contain /.
          sed -i "s|s3_access_key_id=''|s3_access_key_id='${KEY_ID}'|" /tmp/publishable.sql
          sed -i "s|s3_secret_access_key=''|s3_secret_access_key='${SECRET}'|" /tmp/publishable.sql

          # Verify substitution happened (grep for empty = failure).
          if grep -E "s3_(access_key_id|secret_access_key)=''" /tmp/publishable.sql; then
            echo "::error::Credential substitution failed — SET statements still empty."
            exit 1
          fi

      - name: Execute DuckDB script
        run: |
          # Use a fresh in-memory DuckDB — no local state persists between runs.
          duckdb -no-stdin :memory: < /tmp/publishable.sql

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Publishable Parquet export failed for ${{ steps.date.outputs.iso }}."
          echo "Check R2 credentials + the analytics-worker /publishable-sql endpoint."
          echo "Re-run with workflow_dispatch once the fix lands."
